services:
  mongo:
    image: mongo:7
    # Single-node replica set so multi-document transactions work locally.
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: >
        mongosh --quiet --eval
        "try { rs.status().ok } catch (e) { rs.initiate().ok }"
      interval: 5s
      timeout: 10s
      retries: 10

  api:
    build: ./server
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: 4000
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:5173
      MONGO_URI: mongodb://mongo:27017/orbit?replicaSet=rs0
      JWT_ACCESS_SECRET: dev-access-secret-change-me-please
      JWT_REFRESH_SECRET: dev-refresh-secret-change-me-please
    ports:
      - "4000:4000"

  web:
    build: ./web
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  mongo_data:
